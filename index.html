  async function exportQuote(official){
    await ensureNumber();
    persist();
    const issues=validationIssues(state.current,official);
    if(issues.length){showValidation(issues);return false}
    const db=getClient(),identity=getIdentity(),role=identity.membership?.role||'';
    if(!official&&role&&!['administrator','sales'].includes(role)){
      showValidation([{step:7,field:'',text:'Draft quotation export is available to Sales and Administrator users.'}]);
      return false;
    }
    if(official&&(!db||!identity.user||!identity.membership)){
      showValidation([{step:7,field:'',text:'Official quotation export requires an authenticated server verification.'}]);
      return false;
    }
    if(db&&identity.user){
      await syncCloud();
      const result=await db.rpc('validate_quotation_export',{target_id:state.current.id,official:!!official});
      if(result.error){showValidation([{step:7,field:'',text:result.error.message}]);return false}
      if(result.data&&!result.data.ready){
        showValidation((result.data.issues||[]).map(text=>({step:/Prepared|Approved|approval|status/i.test(text)?6:/item/i.test(text)?3:0,field:/Prepared/i.test(text)?'signoff.preparedByName':/Approved/i.test(text)?'signoff.approvedBy':'customer.name',text})));
        return false;
      }
      if(official){
        const serverRevision=Number(result.data.revision),serverTotal=Number(result.data.final_total);
        if(serverRevision!==Number(state.current.revisionNumber)||!Number.isFinite(serverTotal)||Math.abs(serverTotal-Number(state.current.totals.finalTotal))>.009){
          showValidation([{step:7,field:'',text:'The cloud quotation revision or selling total changed. Reload the quotation before official export.'}]);
          return false;
        }
        state.current.serverVerification={code:result.data.verification_code||'',verifiedAt:result.data.verified_at||new Date().toISOString(),revision:serverRevision};
      }
    }
    state.current.history.push({at:new Date().toISOString(),action:(official?'Official':'Draft')+' PDF exported',by:identity.profile?.full_name||identity.user?.email||''});
    persist();
    return preview(!official,true);
  }

<script>
// Keep the separate Studio project catalog consistent during the existing workspace sync.
(function(){
  "use strict";
  var STUDIO_PROJECTS_KEY="jt_studio_projects";
  var nativeFetch=window.fetch.bind(window);
  var startupStudioProjects=readStudioProjects();
  var startupCatalogPending=startupStudioProjects.length>0;

  function readStudioProjects(){
    try{
      var value=JSON.parse(localStorage.getItem(STUDIO_PROJECTS_KEY)||"[]");
      return Array.isArray(value)?value:[];
    }catch(error){
      console.warn("Studio project catalog could not be read:",error);
      return [];
    }
  }

  function legacyStudioProjectId(record){
    var text=String(record&&record.name||"studio-project")+"|"+String(record&&record.createdAt||record&&record.savedAt||record&&record.date||"");
    var hash=2166136261;
    for(var i=0;i<text.length;i++){
      hash^=text.charCodeAt(i);
      hash=Math.imul(hash,16777619);
    }
    return "studio_legacy_"+(hash>>>0).toString(36);
  }

  function normalizeStudioProjectRecord(record){
    record=record&&typeof record==="object"?record:{};
    var rawState=record.state&&typeof record.state==="object"?record.state:{};
    var state=Object.assign({showCleatLabels:true,cleatLabelOverrides:{}},rawState,{cleatLabelOverrides:Object.assign({},rawState.cleatLabelOverrides||{})});
    var updatedAt=record.updatedAt||record.savedAt||record.date||new Date(0).toISOString();
    var createdAt=record.createdAt||record.savedAt||record.date||updatedAt;
    return Object.assign({},record,{
      id:String(record.id||legacyStudioProjectId(record)),
      name:String(record.name||state.projectName||"Untitled Studio Project"),
      createdAt:String(createdAt),
      updatedAt:String(updatedAt),
      savedAt:String(record.savedAt||updatedAt),
      source:"studio",
      state:state
    });
  }

  function studioProjectTime(record){
    var value=Date.parse(record&&record.updatedAt||record&&record.savedAt||record&&record.createdAt||0);
    return Number.isFinite(value)?value:0;
  }

  function mergeStudioProjectCatalog(){
    var lists=Array.prototype.slice.call(arguments),byId=new Map(),legacyNames=new Map();
    lists.forEach(function(list){
      (Array.isArray(list)?list:[]).forEach(function(raw){
        var record=normalizeStudioProjectRecord(raw),id=String(record.id),name=record.name.trim().toLowerCase();
        var existing=byId.get(id);
        if(!existing&&(!raw.id||String(raw.id).indexOf("studio_legacy_")===0)&&name){
          var legacyId=legacyNames.get(name);
          if(legacyId)existing=byId.get(legacyId);
        }
        if(!existing||studioProjectTime(record)>=studioProjectTime(existing)){
          if(existing&&existing.id!==id)byId.delete(existing.id);
          byId.set(id,record);
          if(name)legacyNames.set(name,id);
        }
      });
    });
    return Array.from(byId.values()).sort(function(a,b){return studioProjectTime(b)-studioProjectTime(a)});
  }

  window.mergeIndexStudioProjectCatalog=function(cloudProjects,includeStartup){
    var merged=mergeStudioProjectCatalog(
      includeStartup&&startupCatalogPending?startupStudioProjects:[],
      readStudioProjects(),
      cloudProjects
    );
    localStorage.setItem(STUDIO_PROJECTS_KEY,JSON.stringify(merged));
    if(includeStartup)startupCatalogPending=false;
    return merged;
  };

  function workspaceUrl(value){
    var url=typeof value==="string"?value:value&&value.url;
    return String(url||"").indexOf("/rest/v1/tank_workspaces")>=0;
  }

  async function authenticatedWorkspaceHeaders(input,init){
    var headers=new Headers(init&&init.headers||input&&input.headers||{});
    var salesApi=window.WinkoSalesOrders;
    var db=salesApi&&typeof salesApi.getClient==="function"?salesApi.getClient():null;
    if(!db||!db.auth)throw new Error("Secure cloud session is not ready. Your local drawing is still available.");
    var result=await db.auth.getSession();
    if(result.error)throw new Error("Cloud session check failed: "+result.error.message);
    var token=result.data&&result.data.session&&result.data.session.access_token;
    if(!token)throw new Error("Sign in to load cloud drawings. Your local drawing is still available.");
    headers.set("Authorization","Bearer "+token);
    return headers;
  }

  function cloudStudioProjectsFromResponse(response){
    return response.clone().json().then(function(rows){
      var row=Array.isArray(rows)?rows[0]:rows;
      return row&&row.data&&Array.isArray(row.data.studioProjects)?row.data.studioProjects:[];
    });
  }

  window.fetch=async function(input,init){
    var url=typeof input==="string"?input:input&&input.url;
    var method=String(init&&init.method||input&&input.method||"GET").toUpperCase();
    if(!workspaceUrl(url))return nativeFetch(input,init);

    var requestInput=input;
    var requestInit=Object.assign({},init||{},

    if(method==="POST"){
      var headers=new Headers(requestInit.headers||input&&input.headers||{});

      var verifiedUrl=new URL(String(url),location.href);
      if(!verifiedUrl.searchParams.has("on_conflict"))verifiedUrl.searchParams.set("on_conflict","name");
      if(!verifiedUrl.searchParams.has("select"))verifiedUrl.searchParams.set("select","name,updated_at");
      requestInput=verifiedUrl.toString();
      requestInit=Object.assign({},requestInit,{headers:headers});
    }

    var response=await nativeFetch(requestInput,requestInit);
    if(method==="GET"&&response.ok){
      cloudStudioProjectsFromResponse(response).then(function(cloudProjects){
        // Existing React cloud load writes localStorage after this response resolves.
        // Re-merge once on the next task so neither local nor cloud Studio projects are lost.
        setTimeout(function(){window.mergeIndexStudioProjectCatalog(cloudProjects,true)},50);
      }).catch(function(error){console.warn("Cloud Studio catalog was invalid:",error)});
    }
    if(method==="POST"&&response.ok){
      try{
        var saved=await response.clone().json();
        var row=Array.isArray(saved)?saved[0]:saved;
        if(!row||!row.name)throw new Error("Supabase did not return the saved workspace row");
        if(window.WinkoSalesOrders&&window.WinkoSalesOrders.scheduleActiveDrawingSync)window.WinkoSalesOrders.scheduleActiveDrawingSync();
      }catch(error){
        console.error("Cloud save verification failed:",error);
        return new Response(JSON.stringify({message:"Cloud row unavailable or invalid"}),{
          status:502,
          statusText:"Cloud save could not be verified",
          headers:{"Content-Type":"application/json"}
        });
      }
    }
    return response;
  };

  window.checkIndexCloudCatalog=function(){
    return {storageKey:STUDIO_PROJECTS_KEY,projects:readStudioProjects().length,startupMergePending:startupCatalogPending};
  };
})();
</script>

<script>
/* Progressive UI guidance for the existing React drawing engine. */
(function(){
  "use strict";
  const MODE_KEY="winko_index_ui_mode";
  const WELCOME_KEY="winko_index_welcome_dismissed";
  const STEP_KEY="winko_index_guided_step";
  const PANEL_KEY="winko_index_panel_state";
  const steps=[
    {name:"Project Details",target:"drawingSetup"},
    {name:"Tank Size",target:"drawingSetup"},
    {name:"Panel Layout",target:"drawingCanvas"},
    {name:"Levels & Stays",target:"angleStaySchedule"},
    {name:"Fittings",target:"drawingTools"},
    {name:"Review",target:"drawingValidation"},
    {name:"Send to Studio",studio:true}
  ];
  let step=Math.max(0,Math.min(steps.length-1,Number(sessionStorage.getItem(STEP_KEY)||0)));
  let mode=localStorage.getItem(MODE_KEY)==="advanced"?"advanced":"simple";
  let reviewOpen=false;

  function appState(){try{return window.__jutaramaIndexApp?.getState?.()||{}}catch{return{}}}
  function projectData(){
    try{
      const data=JSON.parse(localStorage.getItem("tankproj")||"{}");
      const drawing=(data.drawings||[]).find(item=>String(item.id)===String(data.activeId))||(data.drawings||[])[0]||{};
      return {data,drawing};
    }catch{return{data:{},drawing:{}}}
  }
  function drawingStayCount(drawing){return(drawing.levels||[]).reduce((sum,level)=>sum+Object.keys(level.stays||{}).length,0)}
  function finalStayQty(drawing){const value=drawing.exportOverrides?.angleStayQty;return Number.isFinite(value)?Math.max(0,Math.round(value)):drawingStayCount(drawing)}
  function issuesFor(drawing){
    const issues=[];
    if(!String(drawing.name||"").trim())issues.push({level:"Warning",text:"Add a drawing name before issue."});
    if(!(Number(drawing.cols)>0&&Number(drawing.rows)>0&&Number(drawing.height)>0))issues.push({level:"Error",text:"Tank dimensions must be greater than zero."});
    if(!String(drawing.dwgNo||"").trim())issues.push({level:"Information",text:"Drawing number is not set."});
    const actual=drawingStayCount(drawing),final=finalStayQty(drawing);
    if(actual!==final)issues.push({level:"Warning",text:"Schedule quantity differs from the stays detected in the drawing."});
    return issues;
  }
  function setMode(next){mode=next==="advanced"?"advanced":"simple";localStorage.setItem(MODE_KEY,mode);document.documentElement.dataset.uiMode=mode;refresh()}
  function scrollToTarget(id){
    const fallback={drawingSetup:"[data-app-view='drawing'] > div:nth-child(2)",drawingCanvas:"main",drawingTools:"[data-app-view='drawing']",drawingValidation:".validation-row, .validation-ok"};
    const target=document.getElementById(id)||document.querySelector(fallback[id]||"");
    target?.scrollIntoView({behavior:"smooth",block:"start"});
  }
  function goStep(index){
    step=index;sessionStorage.setItem(STEP_KEY,String(step));
    const item=steps[index];
    if(item.studio){openReview(true);return}
    if(index===5){openReview(false);return}
    scrollToTarget(item.target);refresh();
  }
  function findButton(text){return Array.from(document.querySelectorAll("button")).find(button=>button.textContent.trim().toLowerCase().includes(text.toLowerCase()))}
  function openReview(sendToStudio){reviewOpen=true;renderReview(sendToStudio)}
  function closeReview(){reviewOpen=false;document.getElementById("winkoReview")?.remove()}
  function renderReview(sendToStudio){
    document.getElementById("winkoReview")?.remove();
    const {drawing}=projectData(),actual=drawingStayCount(drawing),final=finalStayQty(drawing),issues=issuesFor(drawing);
    const overlay=document.createElement("div");overlay.id="winkoReview";overlay.className="review-backdrop";
    overlay.innerHTML=`<section class="review-dialog" role="dialog" aria-modal="true" aria-labelledby="winkoReviewTitle"><div class="dialog-head"><div><h2 id="winkoReviewTitle">Drawing review</h2><p>Confirm the engineering drawing state before printing or transferring it to 3D Studio.</p></div><button class="ui-secondary" data-review-close>Close</button></div><div class="dialog-body"><div class="review-grid"><div class="review-metric"><b>${(drawing.levels||[]).length}</b><span>Drawing levels</span></div><div class="review-metric"><b>${actual} pcs</b><span>Detected angle stays</span></div><div class="review-metric"><b>${final} pcs</b><span>Final schedule quantity</span></div></div><div class="review-issues">${issues.length?issues.map(issue=>`<div class="review-issue ${issue.level.toLowerCase()}"><b>${issue.level}</b><span>${issue.text}</span></div>`).join(""):`<div class="review-issue"><b style="color:#25734e">Ready</b><span>No current drawing warnings.</span></div>`}</div></div><div class="dialog-actions"><button class="ui-secondary" data-review-close>Continue Editing</button><button class="ui-secondary" data-review-print>Print Preview</button><button class="ui-primary" data-review-studio>${sendToStudio?"Confirm and Open 3D Studio":"Send to 3D Studio"}</button></div></section>`;
    overlay.addEventListener("click",event=>{if(event.target===overlay||event.target.closest("[data-review-close]"))closeReview();else if(event.target.closest("[data-review-print]")){closeReview();findButton("Open Print Preview")?.click()}else if(event.target.closest("[data-review-studio]")){closeReview();window.__jutaramaIndexApp?.openStudio?.()}});
    document.body.appendChild(overlay);overlay.querySelector("[data-review-close]")?.focus();
  }

<script>
(function(){
  'use strict';
  // Full one-page BOM workspace. Studio remains the authoritative quantity source.
  const STORE_KEY='winko_full_bom_workspace_v1';
  const esc=value=>String(value==null?'':value).replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
  const num=(value,fallback=0)=>value!==''&&value!==null&&Number.isFinite(+value)?+value:fallback;
  const clone=value=>JSON.parse(JSON.stringify(value));
  const defaults=()=>({rows:{},manualItems:[],categories:[],thickness:{roof:1.5,base:5,wallL1:5,wallL2:5,wallL3:3,wallL4:3,panelWidth:1220,panelHeight:1220,density:7850}});
  function readStore(){try{const value=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');return value&&typeof value==='object'?value:{}}catch{return {}}}
  function writeStore(store){localStorage.setItem(STORE_KEY,JSON.stringify(store))}
  function recordKey(record){return String(record?.sourceStudioProjectId||record?.id||'default')}
  function configFor(record){const store=readStore(),base=defaults(),saved=store[recordKey(record)]||{},config={...base,...saved,rows:{...base.rows,...saved.rows},manualItems:Array.isArray(saved.manualItems)?saved.manualItems:[],categories:Array.isArray(saved.categories)?saved.categories:[],thickness:{...base.thickness,...saved.thickness}};config.thickness.tierCount=tankTierCount(record);return config}
  function saveConfig(record,config){const store=readStore();store[recordKey(record)]={...config,updatedAt:new Date().toISOString()};writeStore(store);persistThicknessToDrawing(record,config.thickness)}
  function rowKey(item,index){return [item.code||item.pricingCode||'ITEM',item.category||'GENERAL',item.description||'',index].join('|')}
  function isPanel(item){const code=String(item.code||item.pricingCode||'').toUpperCase(),detail=[item.description,item.spec].join(' ');return /PANEL/i.test(detail)||/^P(?:ANEL)?[-_ ]?\d/i.test(code)||/HDG_PANEL/i.test(code)}
  function panelThicknessField(item){if(!isPanel(item))return null;const text=[item.category,item.code,item.description,item.spec].join(' ').toUpperCase();if(/ROOF|TOP PANEL/.test(text))return'roof';if(/BASE|BOTTOM|FLOOR PANEL/.test(text))return'base';const tier=text.match(/(?:L|LEVEL|TIER)\s*[- ]?([1-4])/);return tier?'wallL'+tier[1]:'wall'}
  function tankTierCount(record){const match=String(record?.tankSize||'').match(/(?:x|X)\s*(\d+(?:\.\d+)?)\s*(?:ft)?\s*$/);return Math.max(1,Math.min(4,Math.round(num(match?.[1],4)/4)))}
  function panelThicknessValue(item,thickness,record){const field=panelThicknessField(item);if(!field)return null;if(field!=='wall')return Math.max(0,num(thickness[field]));const tiers=Math.max(1,Math.min(4,Math.round(num(thickness.tierCount,tankTierCount(record))))),value=Array.from({length:tiers},(_,index)=>Math.max(0,num(thickness['wallL'+(index+1)]))).reduce((sum,itemValue)=>sum+itemValue,0)/tiers;thickness.wall=value;return value}

  function persistThicknessToDrawing(record,thickness){try{const project=JSON.parse(localStorage.getItem('tankproj')||'{}');if(!Array.isArray(project.drawings))return;const match=project.drawings.find(d=>String(d.id)===String(record.projectId)||String(d.name||'').toLowerCase()===String(record.project||'').toLowerCase());if(match){match.panelThickness=clone(thickness);localStorage.setItem('tankproj',JSON.stringify(project))}}catch(error){console.warn('Panel thickness project persistence failed:',error)}}
  function getRecords(sync=true){const api=window.WinkoClientWorkspace;try{return(sync?api?.syncBomRecords?.():api?.getBomRecords?.())||[]}catch(error){console.warn('BOM sync failed:',error);return api?.getBomRecords?.()||[]}}

  function effectiveRows(record,config){const generated=(record.items||[]).map((item,index)=>{const key=rowKey(item,index),override=config.rows[key]||{},panelWeight=panelUnitWeight(item,config.thickness),quantity=Math.max(0,num(override.quantity,item.quantity)),unitWeight=override.unitWeight!==undefined?Math.max(0,num(override.unitWeight)):panelWeight!=null?panelWeight:item.unitWeight==null?null:Math.max(0,num(item.unitWeight)),unitPrice=Math.max(0,num(override.unitPrice,item.unitPrice)),category=override.category||item.category||'GENERAL',description=override.description||item.description||'BOM item',spec=override.spec!==undefined?override.spec:item.spec||'',unit=override.unit||item.unit||'pcs',excluded=!!override.excluded,manual=Object.keys(override).some(name=>name!=='excluded')||!!override.excluded;return{...item,key,category,description,spec,unit,quantity,unitWeight,unitPrice,totalWeight:unitWeight==null?null:quantity*unitWeight,amount:quantity*unitPrice,excluded,manual,isGenerated:true,thicknessField:panelThicknessField(item)}});const manual=(config.manualItems||[]).map(item=>{const quantity=Math.max(0,num(item.quantity)),unitWeight=item.unitWeight===''||item.unitWeight==null?null:Math.max(0,num(item.unitWeight)),unitPrice=Math.max(0,num(item.unitPrice));return{...item,key:item.id,category:item.category||'GENERAL',description:item.description||'Manual item',spec:item.spec||'',unit:item.unit||'pcs',quantity,unitWeight,unitPrice,totalWeight:unitWeight==null?null:quantity*unitWeight,amount:quantity*unitPrice,excluded:!!item.excluded,manual:true,isGenerated:false}});return generated.concat(manual)}
  function totals(rows){const active=rows.filter(row=>!row.excluded);return{lines:active.length,quantity:active.reduce((sum,row)=>sum+num(row.quantity),0),weight:active.reduce((sum,row)=>sum+num(row.totalWeight),0),amount:active.reduce((sum,row)=>sum+num(row.amount),0),overrides:rows.filter(row=>row.manual).length}}

  function open(requestedId){
    close();let records=getRecords(true),record=selectRecord(records,requestedId),config=record?configFor(record):defaults(),search='',categoryFilter='ALL',showZero=false,oldOverflow=document.body.style.overflow;document.body.style.overflow='hidden';const host=document.createElement('section');host.id='winkoBomWorkspace';host.className='wbom-page';host.setAttribute('aria-label','Full BOM workspace');

      const rows=effectiveRows(record,config),viewRows=filteredRows(rows),sum=totals(rows),cats=categories(rows),currency=record.currency||'MYR';let lastCategory='';const tableRows=viewRows.map(row=>{let heading='';if(row.category!==lastCategory){lastCategory=row.category;heading='<tr class="wbom-category-row"><td colspan="11">'+esc(row.category)+'</td></tr>'}const source=row.excluded?'Excluded':row.manual?'Manual':'Auto';return heading+'<tr data-row="'+esc(row.key)+'"><td><input aria-label="Item code" data-field="code" value="'+esc(row.code||'')+'" '+(row.isGenerated?'readonly':'')+'></td><td class="desc"><input aria-label="Description" data-field="description" value="'+esc(row.description)+'"><small style="display:block;color:#718297;margin-top:3px">'+esc(row.spec||'')+(row.thicknessField?' | '+num(config.thickness[row.thicknessField]).toFixed(1)+' mm panel':'')+'</small></td><td><select aria-label="Category" data-field="category">'+cats.map(cat=>'<option '+(cat===row.category?'selected':'')+'>'+esc(cat)+'</option>').join('')+'</select></td><td><input type="number" min="0" step="1" aria-label="Quantity" data-field="quantity" value="'+esc(row.quantity)+'"></td><td><input aria-label="Unit" data-field="unit" value="'+esc(row.unit)+'"></td><td><input type="number" min="0" step="0.01" aria-label="Unit weight" data-field="unitWeight" value="'+(row.unitWeight==null?'':row.unitWeight.toFixed(3))+'"></td><td class="num">'+(row.totalWeight==null?'-':row.totalWeight.toFixed(2))+'</td><td><input type="number" min="0" step="0.01" aria-label="Unit price" data-field="unitPrice" value="'+row.unitPrice.toFixed(2)+'"></td><td class="num money">'+currency+' '+row.amount.toFixed(2)+'</td><td><span class="wbom-source '+(row.excluded?'excluded':row.manual?'manual':'')+'">'+source+'</span></td><td><div class="wbom-row-actions">'+(row.isGenerated?'<button class="wbom-btn compact" data-reset title="Reset this row to Studio values">Reset</button><button class="wbom-btn compact '+(row.exclu       host.innerHTML='<header class="wbom-head"><div class="wbom-brand"><span class="wbom-logo">WINKO</span><div><h1>Full BOM Workspace</h1><p>Automatic quantities and pricing</p></div></div><div class="wbom-project"><strong>'+esc(record.project)+'</strong><span>'+esc(record.client)+' | '+esc(record.tankSize)+' | Studio BOM updated '+esc(new Date(record.updatedAt||Date.now()).toLocaleString())+'</span></div><span class="wbom-save-state">Auto-saved</span><div class="wbom-actions"><button class="wbom-btn secondary-action" data-pricing>Pricing</button><button class="wbom-btn secondary-action" data-csv>CSV</button><button class="wbom-btn secondary-action" data-json>JSON</button><button class="wbom-btn primary" data-print>Print / PDF</button><button class="wbom-btn" data-close>Back</button></div></header><div class="wbom-body"><aside class="wbom-side"><section class="wbom-section"><h2>Project BOM</h2><label class="wbom-field">Saved Studio BOM<select data-record>'+records.map(item=>'<option value="'+esc(item.id)+'" '+(item.id===record.id?'selected':'')+'>'+esc(item.project)+' - '+esc(item.tankSize)+'</option>').join('')+'</select></label><button class="wbom-btn primary" style="width:100%" data-recalculate>Recalculate from Studio</button><p class="wbom-hint">Refreshes all generated quantities and keeps your saved overrides.</p></section><section class="wbom-section"><h2>Steel panel thickness</h2>'+[['roof','Roof panel'],['base','Base panel'],['wallL1','Wall L1'],['wallL2','Wall L2'],['wallL3','Wall L3'],['wallL4','Wall L4']].map(([key,label])=>'<div class="wbom-thickness"><label for="thick-'+key+'">'+label+'</label><input id="thick-'+key+'" data-thickness="'+key+'" type="number" min="0" step="0.1" value="'+esc(config.thickness[key])+'" aria-label="'+label+' thickness in millimetres"></div>').join('')+'<p class="wbom-hint">Panel weight = width x height x thickness x steel density. Values are stored per BOM.</p></section><section class="wbom-section"><h2>Panel weight setting     host.addEventListener('change',event=>{const target=event.target;if(target.matches('[data-record]')){record=selectRecord(records,target.value);config=configFor(record);render();return}if(target.matches('[data-filter]')){categoryFilter=target.value;render();return}if(target.matches('[data-zero]')){showZero=target.checked;render();return}if(target.matches('[data-thickness]')){config.thickness[target.dataset.thickness]=Math.max(0,num(target.value));persist();render();return}const row=target.closest('tr[data-row]');if(row&&target.dataset.field){setOverride(row.dataset.row,target.dataset.field,target.type==='number'?Math.max(0,num(target.value)):target.value)}});

    document.body.appendChild(host);render();host.querySelector('[data-search]')?.focus();host._oldOverflow=oldOverflow;
  }
  function close(){const host=document.getElementById('winkoBomWorkspace');if(host){document.body.style.overflow=host._oldOverflow||'';host.remove()}}
  document.addEventListener('keydown',event=>{if(event.key==='Escape'&&document.getElementById('winkoBomWorkspace'))close()});
  window.WinkoBomWorkspace={open,close,getRecords:()=>getRecords(false),getWorkspaceStore:readStore};
})();
</script>
<style id="winkoRenameDialogStyles">
  .winko-rename-backdrop{position:fixed;inset:0;z-index:1000000;background:rgba(9,18,30,.55);display:grid;place-items:center;padding:18px}.winko-rename-dialog{width:min(430px,96vw);background:#fff;border:1px solid #cbd6e1;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;font:13px Arial,sans-serif;color:#172234}.winko-rename-dialog header{padding:15px 17px;border-bottom:1px solid #dde5ed}.winko-rename-dialog h2{font-size:16px;margin:0}.winko-rename-dialog p{font-size:11px;color:#66798d;margin:3px 0 0}.winko-rename-body{padding:17px}.winko-rename-body label{display:grid;gap:6px;color:#52667a;font-size:11px}.winko-rename-body input{height:38px;border:1px solid #bdcad7;border-radius:7px;padding:0 10px;font-size:14px}.winko-rename-actions{padding:12px 17px;border-top:1px solid #dde5ed;display:flex;justify-content:flex-end;gap:8px}.winko-rename-actions button{height:34px;border:1px solid #bdcad7;border-radius:7px;background:#fff;padding:0 13px;font-weight:700;cursor:pointer}.winko-rename-actions .primary{background:#1f5d91;border-color:#1f5d91;color:#fff}.winko-rename-dialog input:focus-visible,.winko-rename-dialog button:focus-visible{outline:2px solid #f5821f;outline-offset:2px}
</style>
<script>
(function(){
  function close(){document.getElementById('winkoRenameDialog')?.remove()}
  function open(options={}){close();const kind=options.kind==='template'?'template':'project',current=String(options.currentName||''),host=document.createElement('div');host.id='winkoRenameDialog';host.className='winko-rename-backdrop';host.innerHTML='<form class="winko-rename-dialog" role="dialog" aria-modal="true" aria-labelledby="winkoRenameTitle"><header><h2 id="winkoRenameTitle">Rename '+kind+'</h2><p>The saved drawings and IDs will not change.</p></header><div class="winko-rename-body"><label>New name<input name="name" required maxlength="120" value="'+current.replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]))+'"></label></div><div class="winko-rename-actions"><button type="button" data-cancel>Cancel</button><button class="primary" type="submit">Save name</button></div></form>';host.addEventListener('click',event=>{if(event.target===host||event.target.closest('[data-cancel]'))close()});host.querySelector('form').addEventListener('submit',event=>{event.preventDefault();const name=event.currentTarget.elements.name.value.trim();if(!name)return;options.onSave?.(name);close()});document.body.appendChild(host);const input=host.querySelector('input');input.focus();input.select()}
  document.addEventListener('keydown',event=>{if(event.key==='Escape'&&document.getElementById('winkoRenameDialog'))close()});window.WinkoRenameDialog={open,close};
})();
</script>
